services:
  postgres:
    image: postgres:16-alpine
    container_name: lim-postgres
    ports:
      - "51214:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lim_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: lim-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres-data:
